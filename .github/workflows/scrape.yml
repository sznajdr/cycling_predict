name: Daily Data Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 6:00 AM UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install procyclingstats
      run: |
        # Clone procyclingstats if not present
        if [ ! -d "../procyclingstats" ]; then
          git clone https://github.com/yourusername/procyclingstats ../procyclingstats || echo "procyclingstats not available"
        fi
        if [ -d "../procyclingstats" ]; then
          pip install -e ../procyclingstats
        fi
      continue-on-error: true
    
    - name: Cache database
      uses: actions/cache@v3
      with:
        path: data/cycling.db
        key: database-${{ github.run_id }}
        restore-keys: |
          database-
    
    - name: Run scraper
      run: |
        python -m pipeline.runner || echo "Scraper completed with some errors"
      timeout-minutes: 120
      continue-on-error: true
    
    - name: Run tests
      run: |
        python tests/test_connection.py || echo "Connection test failed"
      continue-on-error: true
    
    - name: Upload database artifact
      uses: actions/upload-artifact@v4
      with:
        name: cycling-database-${{ github.run_id }}
        path: data/cycling.db
        retention-days: 7
    
    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scraper-logs-${{ github.run_id }}
        path: logs/
        retention-days: 7
    
    - name: Check database status
      run: |
        python -c "
        import sqlite3
        try:
            conn = sqlite3.connect('data/cycling.db')
            cursor = conn.cursor()
            cursor.execute('SELECT COUNT(*) FROM races')
            races = cursor.fetchone()[0]
            cursor.execute('SELECT COUNT(*) FROM riders')
            riders = cursor.fetchone()[0]
            cursor.execute('SELECT COUNT(*) FROM rider_results')
            results = cursor.fetchone()[0]
            print(f'Database status: {races} races, {riders} riders, {results} results')
            conn.close()
        except Exception as e:
            print(f'Error checking database: {e}')
        "
      continue-on-error: true
